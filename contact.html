<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | St. Xaviers High School</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="page-header">
        <h1>Get In Touch</h1>
    </section>

    <main class="container contact-section">
        <div class="contact-info">
            <h3>Contact Details</h3>
            <p><strong>📍 Address:</strong> Tirtol, Jagatsinghapur, Odisha, 754137</p>
            <p><strong>📞 Phone:</strong> +91 9861066785</p>
            <p><strong>✉️ Email:</strong> stxavierhighschooltirtol@gmail.com</p>

            <div class="map-placeholder">
                <iframe src="https://www.google.com/maps/embed?pb=YOUR_GOOGLE_MAPS_LINK" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

        <div class="contact-form">
            <h3>Send us a Message</h3>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
