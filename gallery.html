<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | St. Xaviers High School</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .page-header{
            text-align:center;
            padding:40px 20px;
            background:#0d6efd;
            color:white;
        }

        .container{
            width:90%;
            margin:auto;
            padding:40px 0;
        }

        /* GALLERY GRID */
        .gallery-grid{
            display:grid;
            grid-template-columns:repeat(3, 1fr); /* 3 Columns */
            gap:20px;
        }

        /* IMAGE BOX */
        .gallery-item{
            overflow:hidden;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            background:white;
        }

        /* IMAGE SIZE */
        .gallery-item img{
            width:100%;
            height:250px;   /* Fixed Height */
            object-fit:cover;
            display:block;
            transition:0.4s ease;
        }

        /* HOVER EFFECT */
        .gallery-item img:hover{
            transform:scale(1.08);
        }

        /* RESPONSIVE */
        @media(max-width:900px){
            .gallery-grid{
                grid-template-columns:repeat(2, 1fr);
            }
        }

        @media(max-width:600px){
            .gallery-grid{
                grid-template-columns:1fr;
            }

            .gallery-item img{
                height:220px;
            }
        }
    </style>
</head>

<body>

    <section class="page-header">
        <h1>School Gallery</h1>
    </section>

    <main class="container">
        <div class="gallery-grid">

            <div class="gallery-item">
                <img src="image/annual function.avif" alt="Annual Function">
            </div>

            <div class="gallery-item">
                <img src="image/computer lab.jpg" alt="Computer Lab">
            </div>

            <!-- <div class="gallery-item">
                <img src="image/download(1).jpg" alt="Students">
            </div> -->

            <div class="gallery-item">
                <img src="image/school 2.jpg" alt="School Building">
            </div>

            <div class="gallery-item">
                <img src="image/annual function.avif" alt="Cultural Program">
            </div>

            <!-- <div class="gallery-item">
                <img src="image/school 1.jpg" alt="Campus View">
            </div> -->

        </div>
    </main>

    
    <script src="script.js"></script>
</body>
</html>
